
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add New Item</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <div class="content">
      <h2>Legg til vare</h2>
      <label>
        Vare:
        <input type="text" id="itemName" autofocus>
      </label><br>
      <label>
        Butikk:
        <input type="text" id="itemShop">
      </label><br>
    </div>

    <div class="footer">
      <button onclick="submitItem()">OK</button>
      <button class="button-secondary" onclick="cancelAdd()">Cancel</button>
    </div>
  </div>

  <script type="module" src="./js/additemtodatabase.js"></script>
</body>
</html>
